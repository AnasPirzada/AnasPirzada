<svg xmlns="http://www.w3.org/2000/svg" width="800" height="270" viewBox="0 0 800 270">
  <rect width="800" height="270" fill="#0d1117" rx="8"/>
  <text x="20" y="28" fill="#58a6ff" font-size="13" font-family="Courier New, monospace">$ cat engineering-principles.md</text>
  <line x1="20" y1="36" x2="780" y2="36" stroke="#21262d" stroke-width="1"/>
  <rect x="15" y="46" width="770" height="40" fill="#161b22" rx="4"/>
  <rect x="15" y="46" width="3" height="40" fill="#00FF9C" rx="2"/>
  <text x="28" y="62" fill="#8b949e" font-size="10" font-family="Courier New, monospace">01</text>
  <text x="52" y="62" fill="#e3b341" font-size="12" font-family="Courier New, monospace" font-weight="bold">Performance First</text>
  <text x="52" y="79" fill="#8b949e" font-size="11" font-family="Courier New, monospace">Milliseconds matter. Users notice what dashboards don't show you.</text>
  <rect x="15" y="92" width="770" height="40" fill="#0d1117" rx="4"/>
  <rect x="15" y="92" width="3" height="40" fill="#7C3AED" rx="2"/>
  <text x="28" y="108" fill="#8b949e" font-size="10" font-family="Courier New, monospace">02</text>
  <text x="52" y="108" fill="#e3b341" font-size="12" font-family="Courier New, monospace" font-weight="bold">Drama-Free Scaling</text>
  <text x="52" y="125" fill="#8b949e" font-size="11" font-family="Courier New, monospace">Backend systems that handle growth without midnight alerts.</text>
  <rect x="15" y="138" width="770" height="40" fill="#161b22" rx="4"/>
  <rect x="15" y="138" width="3" height="38" fill="#00FF9C" rx="2"/>
  <text x="28" y="154" fill="#8b949e" font-size="10" font-family="Courier New, monospace">03</text>
  <text x="52" y="154" fill="#e3b341" font-size="12" font-family="Courier New, monospace" font-weight="bold">Clean Architecture</text>
  <text x="52" y="171" fill="#8b949e" font-size="11" font-family="Courier New, monospace">Code that is easier to delete than to break.</text>
  <rect x="15" y="184" width="770" height="40" fill="#0d1117" rx="4"/>
  <rect x="15" y="184" width="3" height="40" fill="#7C3AED" rx="2"/>
  <text x="28" y="200" fill="#8b949e" font-size="10" font-family="Courier New, monospace">04</text>
  <text x="52" y="200" fill="#e3b341" font-size="12" font-family="Courier New, monospace" font-weight="bold">Full Ownership</text>
  <text x="52" y="217" fill="#8b949e" font-size="11" font-family="Courier New, monospace">Architecture to deployment. One person, end to end.</text>
  <rect x="15" y="230" width="770" height="38" fill="#161b22" rx="4"/>
  <rect x="15" y="230" width="3" height="38" fill="#00FF9C" rx="2"/>
  <text x="28" y="246" fill="#8b949e" font-size="10" font-family="Courier New, monospace">05</text>
  <text x="52" y="246" fill="#e3b341" font-size="12" font-family="Courier New, monospace" font-weight="bold">Intentional Docs</text>
  <text x="52" y="263" fill="#8b949e" font-size="11" font-family="Courier New, monospace">Comment the why. The how is in the diff.</text>
</svg>